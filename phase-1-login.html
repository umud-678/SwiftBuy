<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftBuy | Giriş</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2f6fed;
      --accent: #16b79e;
      --border: #e3e8f2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f8faff 0%, var(--bg) 100%);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      padding: 16px;
    }
    .login-card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      padding: 24px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 24px;
      color: #1d4ed8;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
    }
    .tagline {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      margin: 12px 0 6px;
      font-size: 14px;
    }
    input {
      width: 100%;
      border: 1px solid #d7deea;
      color: var(--text);
      background: #f9fbff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.16); }
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 16px;
    }
    .role {
      border: 1px solid #d7deea;
      background: #f9fbff;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #425166;
    }
    .role.active {
      background: linear-gradient(135deg, #2f6fed, #5d8ef1);
      border-color: #8fb0f6;
      color: #fff;
    }
    .actions { margin-top: 6px; }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-decoration: none;
      text-align: center;
    }
    .btn-primary { background: linear-gradient(135deg, #2f6fed, #5d8ef1); color: #fff; }
    .helper {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .intro {
      font-size: 13px;
      line-height: 1.45;
      color: #49566a;
      background: #f5f8ff;
      border: 1px solid #dbe4f7;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="logo"><span class="dot"></span>SwiftBuy</div>
    <p class="tagline">Sifarişlərinizi rəqəmsallaşdırın.</p>
    <p class="intro">Bu platformada mağaza məhsul sifariş edir, distribyutor isə sifarişi qəbul edib statusu idarə edir.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="store@alimarket.az" />

      <label for="password">Şifrə</label>
      <input id="password" type="password" placeholder="********" />

      <label>Hesab növü</label>
      <div class="options" id="roles">
        <button type="button" class="role active" data-role="store">Mağaza</button>
        <button type="button" class="role" data-role="distributor">Distribyutor</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Daxil ol</button>
      </div>
      <p class="helper">Daxil olduqdan sonra uyğun panelə yönləndiriləcəksiniz.</p>
    </form>
  </main>
  <script>
    const form = document.getElementById("loginForm");
    const roleButtons = [...document.querySelectorAll(".role")];
    let selectedRole = "store";

    roleButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        roleButtons.forEach((item) => item.classList.remove("active"));
        btn.classList.add("active");
        selectedRole = btn.dataset.role;
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const target = selectedRole === "distributor"
        ? "./phase-4-distributor-panel.html"
        : "./phase-2-store-dashboard.html";
      window.location.href = target;
    });
  </script>
</body>
</html>
